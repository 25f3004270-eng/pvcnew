{% extends "base.html" %}

{% block title %}IEEMA Month{% endblock %}

{% block content %}
<div class="mt-3">
  <h4>{{ "Edit IEEMA Month" if row else "Add IEEMA Month" }}</h4>
  <hr>

  <form method="post" class="col-md-6">
    <div class="mb-3">
      <label class="form-label">Month (any date in month)</label>
      <input
        class="form-control"
        type="date"
        name="month"
        value="{% if row %}{{ row.month.strftime('%Y-%m-%d') }}{% endif %}"
        required
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Copper</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="copper"
        value="{{ row.copper if row else '' }}"
      >
    </div>

    <div class="mb-3">
      <label class="form-label">CRGO</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="crgo"
        value="{{ row.crgo if row else '' }}"
      >
    </div>

    <div class="mb-3">
      <label class="form-label">MS</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="ms"
        value="{{ row.ms if row else '' }}"
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Insulation Material</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="insmat"
        value="{{ row.insmat if row else '' }}"
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Transformer Oil</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="transoil"
        value="{{ row.transoil if row else '' }}"
      >
    </div>

    <div class="mb-3">
      <label class="form-label">WPI</label>
      <input
        class="form-control"
        type="number"
        step="0.01"
        name="wpi"
        value="{{ row.wpi if row else '' }}"
      >
    </div>

    <button class="btn btn-primary" type="submit">Save</button>
    <a href="{{ url_for('admin_ieema_list') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
