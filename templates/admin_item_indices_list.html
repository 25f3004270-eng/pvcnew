{% extends "base.html" %}

{% block title %}{{ item.name }} – Indices{% endblock %}

{% block content %}
<div class="mt-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h4>Indices for {{ item.name }}</h4>
    <a href="{{ url_for('admin_item_indices_new', item_id=item.id) }}"
       class="btn btn-sm btn-success">Add Month</a>
  </div>

  <div class="table-responsive">
    <table class="table table-sm table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>Month</th>
          <th>Indices JSON</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for r in rows %}
        <tr>
          <td>{{ r.month.strftime('%Y-%m') }}</td>
          <td><code class="small">{{ r.indices_json }}</code></td>
          <td>
            <a href="{{ url_for('admin_item_indices_edit',
                                item_id=item.id, row_id=r.id) }}"
               class="btn btn-sm btn-primary">Edit</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
